<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>القطاع الطبي | شركة الشرق</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Base -->
    <link rel="stylesheet" href="../../../assets/css/style.css" />

    <!-- Shared -->
    <link rel="stylesheet" href="../../../assets/css/header.css" />

    <!-- Sectors (Title style + sectors section) -->
    <link rel="stylesheet" href="../../../assets/css/sectors.css" />

    <!-- ISO Section Style -->
    <link rel="stylesheet" href="../../../assets/css/iso.css" />

    <!-- Footer -->
    <link rel="stylesheet" href="../../../assets/css/footer.css" />

    <!-- Page Sections -->
    <link
      rel="stylesheet"
      href="../../../assets/css/pages/sectors/medical/section-1.css"
    />
    <link
      rel="stylesheet"
      href="../../../assets/css/pages/sectors/medical/section-2.css"
    />

    <script src="../../../assets/js/header.js" defer></script>

    <script
      src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"
      defer
    ></script>
    <script src="/assets/js/hero.js" defer></script>

    <!-- Sectors JS (same as homepage) -->
    <script src="../../../assets/js/sectors.js" defer></script>

    <script src="../../../assets/js/app.js" defer></script>

  <body
    data-show-brand="true"
    data-brand-src="../../../assets/images/header/Brand_Mark.png"
    data-brand-href="../../../index.html#home"
  >
    <div
      id="header-slot"
      data-partial="../../../partials/header.html"
      data-after="lpInitHeader"
      data-show-brand="true"
      data-brand-src="/assets/images/header/Brand_Mark.png"
      data-brand-href="../../../index.html#home"
    ></div>

    <main id="sectors-medical-page">
      <div
        id="sectors-medical-s1-slot"
        data-partial="partials/section-1.html"
      ></div>
      <div
        id="sectors-medical-s2-slot"
        data-partial="partials/section-2.html"
      ></div>

      <!--  Section 3: نفس سكشن القطاعات في الرئيسية (استدعاء فقط كما هو) -->
      <div
        id="sectors-medical-s3-slot"
        data-partial="../../../partials/sectors.html"
      ></div>
    </main>

    <div
      id="footer-slot"
      data-partial="../../../partials/footer.html"
      data-after="lpInitHeroLines"
    ></div>
  </body>
</html>
