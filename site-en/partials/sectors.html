<section class="lp-section lp-sectors" id="sectors" aria-label="Al Sharq sectors">
  <div class="lp-sectors__inner">
    <header class="lp-sectors__head">
      <h2 class="lp-sectors__title">
        Al Sharq <span class="lp-sectors__titleAccent">Sectors</span>
      </h2>
    </header>

    <div class="lp-sectors__sliderWrap" aria-label="Company sectors">
      <div class="lp-sectors__slider lp-focus" tabindex="0">
        <div class="lp-sectors__track">
          <article class="lp-sectorCard" aria-label="Medical sector">
            <img src="../assets/images/section/1.png" alt="Medical sector">
            <a class="lp-iconBtn lp-sectorCard__btn" href="#contact" aria-label="Medical sector details">
              <span class="lp-iconBtn__stroke" aria-hidden="true"></span>
              <span class="lp-iconBtn__layer" aria-hidden="true">
                <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
              </span>
            </a>
            <div class="lp-sectorCard__name">Medical Sector</div>
          </article>

          <article class="lp-sectorCard" aria-label="Commercial sector">
            <img src="../assets/images/section/2.jpeg" alt="Commercial sector">
            <a class="lp-iconBtn lp-sectorCard__btn" href="#contact" aria-label="Commercial sector details">
              <span class="lp-iconBtn__stroke" aria-hidden="true"></span>
              <span class="lp-iconBtn__layer" aria-hidden="true">
                <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
              </span>
            </a>
            <div class="lp-sectorCard__name">Commercial Sector</div>
          </article>
        </div>
      </div>
    </div>
  </div>
</section>
